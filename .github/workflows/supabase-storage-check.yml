name: Supabase Storage Check

on:
  pull_request:
    branches: [main]
    paths:
      - "supabase/config.toml"
      - "supabase/storage/**"
      - "supabase/migrations/**"

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Detect Storage config
        id: detect_storage
        shell: bash
        run: |
          if ! grep -Eq '^[[:space:]]*enabled[[:space:]]*=[[:space:]]*true[[:space:]]*$' supabase/config.toml; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! grep -Eq '^\[storage\.buckets\.[^]]+\]$' supabase/config.toml; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "present=true" >> "$GITHUB_OUTPUT"

      - name: Skip when Storage is not configured
        if: steps.detect_storage.outputs.present != 'true'
        run: echo "Supabase Storage is disabled or has no bucket definitions. Skipping check."

      - name: Link project (for remote dry-run)
        if: steps.detect_storage.outputs.present == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Show pending migrations (dry-run against linked project)
        if: steps.detect_storage.outputs.present == 'true'
        run: supabase db push --dry-run --linked

      - name: Start local supabase
        if: steps.detect_storage.outputs.present == 'true'
        run: supabase start -x studio,imgproxy

      - name: Apply migrations locally
        if: steps.detect_storage.outputs.present == 'true'
        run: supabase db reset

      - name: Seed storage buckets locally
        if: steps.detect_storage.outputs.present == 'true'
        run: supabase seed buckets --local

      - name: Check storage schema drift
        if: steps.detect_storage.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail

          status=0
          diff_output="$(npm run db:check:storage 2>&1)" || status=$?
          echo "$diff_output"

          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

          if echo "$diff_output" | grep -q "No schema changes found"; then
            exit 0
          fi

          echo "Storage schema drift detected. Run 'npm run db:diff:storage migration_name' or create an equivalent migration and commit it." >&2
          exit 1

      - name: Stop local supabase
        if: always() && steps.detect_storage.outputs.present == 'true'
        run: supabase stop
