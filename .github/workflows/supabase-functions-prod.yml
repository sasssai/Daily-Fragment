name: Supabase Edge Functions Deploy (prod)

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"

concurrency:
  group: supabase-functions-deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Detect Edge Functions
        id: detect_functions
        shell: bash
        run: |
          if [ -d supabase/functions ] && find supabase/functions -mindepth 2 -maxdepth 2 -type f -name index.ts | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when no Edge Functions are defined
        if: steps.detect_functions.outputs.present != 'true'
        run: echo "No Edge Functions found under supabase/functions. Skipping deploy."

      - name: Deploy Edge Functions to prod
        if: steps.detect_functions.outputs.present == 'true'
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"
