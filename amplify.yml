version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22.22.1
        - nvm use 22.22.1
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - env > .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
